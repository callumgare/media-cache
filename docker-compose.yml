services:
  app:
    build: .
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: "postgresql://media-cache:example@postgres:5432/media-cache"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: paradedb/paradedb:latest
    restart: always
    shm_size: 1g
    environment:
      POSTGRES_DB: media-cache
      POSTGRES_USER: media-cache
      POSTGRES_PASSWORD: example
    volumes:
      - postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U media-cache"]
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 1s
    ports:
      - 5432:5432

volumes:
  postgres:
