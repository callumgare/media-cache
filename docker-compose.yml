services:
  app:
    build: .
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: "postgresql://postgres:example@postgres:5432/postgres"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: paradedb/paradedb:latest
    restart: always
    shm_size: 1g
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi"]
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 1s

volumes:
  postgres:
